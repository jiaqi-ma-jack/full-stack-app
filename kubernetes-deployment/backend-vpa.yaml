apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: backend-vpa
spec:
  # recommenders: 
  #   - name: 'alternative'
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend-deployment
  updatePolicy:
    updateMode: "InPlaceOrRecreate"
  resourcePolicy:
    containerPolicies:
    - containerName: backend
      minAllowed:
        cpu: 1m
        memory: 10Mi
      maxAllowed:
        cpu: 3m
        memory: 25Mi
      controlledResources:
      - cpu
      - memory
      controlledValues: RequestsAndLimits